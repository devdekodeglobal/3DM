<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Model Preview Gallery</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
  <style>
    body { font-family: system-ui, sans-serif; background-color: #f4f4f5; color: #18181b; padding: 40px; margin: 0; }
    h1 { text-align: center; margin-bottom: 40px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; max-width: 1400px; margin: 0 auto; }
    .card { background: white; border-radius: 12px; padding: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); display: flex; flex-direction: column; align-items: center; }
    .card h3 { margin: 0 0 16px 0; font-size: 14px; color: #3f3f46; word-break: break-all; text-align: center; }
    model-viewer { width: 100%; height: 300px; background-color: #f8fafc; border-radius: 8px; }
    .badge { background: #e2e8f0; padding: 2px 8px; border-radius: 4px; font-size: 10px; margin-top: 8px; }
  </style>
</head>
<body>
  <h1>Updated Model Preview Gallery</h1>
  <div class="grid">
    <div class="card">
      <h3>chair_1.glb</h3>
      <model-viewer src="/models/chair_1.glb" auto-rotate camera-controls shadow-intensity="1"></model-viewer>
    </div>
    <div class="card">
      <h3>chair_2.glb</h3>
      <model-viewer src="/models/chair_2.glb" auto-rotate camera-controls shadow-intensity="1"></model-viewer>
    </div>
    <div class="card">
      <h3>bar_chair_1.glb</h3>
      <model-viewer src="/models/bar_chair_1.glb" auto-rotate camera-controls shadow-intensity="1"></model-viewer>
    </div>
    <div class="card">
      <h3>round_table_1.glb</h3>
      <model-viewer src="/models/round_table_1.glb" auto-rotate camera-controls shadow-intensity="1"></model-viewer>
    </div>
    <div class="card">
      <h3>table1.glb</h3>
      <model-viewer src="/models/table1.glb" auto-rotate camera-controls shadow-intensity="1"></model-viewer>
    </div>
    <div class="card">
      <h3>dustbin.glb</h3>
      <model-viewer src="/models/dustbin.glb" auto-rotate camera-controls shadow-intensity="1"></model-viewer>
    </div>
    <div class="card">
      <h3>plant.glb</h3>
      <model-viewer src="/models/plant.glb" auto-rotate camera-controls shadow-intensity="1"></model-viewer>
    </div>
    <div class="card">
      <h3>ceramic_pot.glb</h3>
      <model-viewer src="/models/ceramic_pot.glb" auto-rotate camera-controls shadow-intensity="1"></model-viewer>
    </div>
    </div>
  </div>
</body>
</html>
